name: CI

on:
  pull_request:
  push:
    branches: [main, next, beta]

jobs:
  test:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: uv sync --all-groups
      - name: Verify codegen is up to date
        run: |
          uv run python scripts/generate_endpoints.py
          uv run ruff check src/norbix_python/api src/norbix_python/hub --fix
          git diff --exit-code
      - name: Lint
        run: uv run ruff check .
      - name: Typecheck
        run: uv run mypy src
      - name: Test
        run: uv run pytest
